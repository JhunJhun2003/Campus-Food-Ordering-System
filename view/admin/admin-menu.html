<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Manage Menu</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://code.iconify.design/iconify-icon/2.1.0/iconify-icon.min.js"></script>
 <link rel="stylesheet" href="admin-menu.css">
</head>
<body>

    <aside class="sidebar">
        <a href="#" class="logo-area"><iconify-icon icon="lucide:utensils-crosses"></iconify-icon><span>FOODIE</span></a>
        <ul class="nav-menu">
            <li class="nav-item"><a href="#"><iconify-icon icon="lucide:layout-dashboard"></iconify-icon>Dashboard</a></li>
            <li class="nav-item"><a href="#"><iconify-icon icon="lucide:users"></iconify-icon>Users</a></li>
            <li class="nav-item active"><a href="#"><iconify-icon icon="lucide:book-open"></iconify-icon>Menu</a></li>
            <li class="nav-item"><a href="#"><iconify-icon icon="lucide:shopping-bag"></iconify-icon>Orders</a></li>
            <li class="nav-item"><a href="#"><iconify-icon icon="lucide:bar-chart-3"></iconify-icon>Reports</a></li>
            <li class="nav-item"><a href="#"><iconify-icon icon="lucide:settings"></iconify-icon>Settings</a></li>
            <li class="nav-item" style="margin-top:auto;"><a href="#"><iconify-icon icon="lucide:log-out"></iconify-icon>Logout</a></li>
        </ul>
    </aside>

    <main class="main-workspace">
        <h1 class="page-header">Admin - Manage Menu</h1>
        <div class="data-panel" style="border: 2px solid #2563EB; border-radius: 12px;">
            <div class="panel-top">
                <div class="search-box">
                    <iconify-icon icon="lucide:search"></iconify-icon>
                    <input type="text" placeholder="Search catalog items...">
                </div>
                <div class="action-cluster">
                    <button class="filter-btn"><iconify-icon icon="lucide:sliders-horizontal"></iconify-icon></button>
                    <button class="add-item-btn"><iconify-icon icon="lucide:plus"></iconify-icon>Add Item</button>
                </div>
            </div>
            <div class="table-responsive">
                <table>
                    <thead>
                        <tr>
                            <th>Item</th>
                            <th>Category</th>
                            <th>Price</th>
                            <th>Status</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>
                                <div class="product-cell">
                                    <img src="https://fonts.gstatic.com/s/e/notoemoji/latest/1f354/512.webp" alt="Burger">
                                    <span>Burger</span>
                                </div>
                            </td>
                            <td>Food</td>
                            <td style="font-weight: 600;">$100</td>
                            <td><span class="status-badge">Active</span></td>
                            <td>
                                <div class="action-row-btns">
                                    <button class="edit-btn"><iconify-icon icon="lucide:pencil"></iconify-icon></button>
                                    <button class="delete-btn"><iconify-icon icon="lucide:trash-2"></iconify-icon></button>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
            <div class="pagination-bar">
                <button class="page-arrow"><iconify-icon icon="lucide:chevron-left"></iconify-icon></button>
                <span class="page-num">1</span>
                <button class="page-arrow"><iconify-icon icon="lucide:chevron-right"></iconify-icon></button>
            </div>
        </div>
    </main>

</body>
</html>
