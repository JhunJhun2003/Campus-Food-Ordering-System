<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Manage Orders</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://code.iconify.design/iconify-icon/2.1.0/iconify-icon.min.js"></script>
<link rel="stylesheet" href="admin-orders.css">
</head>
<body>

    <aside class="sidebar">
        <a href="#" class="logo-area"><iconify-icon icon="lucide:utensils-crosses"></iconify-icon><span>FOODIE</span></a>
        <ul class="nav-menu">
            <li class="nav-item"><a href="#"><iconify-icon icon="lucide:layout-dashboard"></iconify-icon>Dashboard</a></li>
            <li class="nav-item"><a href="#"><iconify-icon icon="lucide:users"></iconify-icon>Users</a></li>
            <li class="nav-item"><a href="#"><iconify-icon icon="lucide:book-open"></iconify-icon>Menu</a></li>
            <li class="nav-item active"><a href="#"><iconify-icon icon="lucide:shopping-bag"></iconify-icon>Orders</a></li>
            <li class="nav-item"><a href="#"><iconify-icon icon="lucide:bar-chart-3"></iconify-icon>Reports</a></li>
            <li class="nav-item"><a href="#"><iconify-icon icon="lucide:settings"></iconify-icon>Settings</a></li>
            <li class="nav-item" style="margin-top:auto;"><a href="#"><iconify-icon icon="lucide:log-out"></iconify-icon>Logout</a></li>
        </ul>
    </aside>

    <main class="main-workspace">
        <h1 class="page-header">Admin - Manage Orders</h1>
        
        <div class="data-panel">
            <h2 class="panel-title">Orders</h2>
            <div class="panel-top">
                <div class="search-box">
                    <iconify-icon icon="lucide:search"></iconify-icon>
                    <input type="text" placeholder="Search orders">
                </div>
                <button class="filter-btn"><iconify-icon icon="lucide:sliders-horizontal"></iconify-icon></button>
            </div>
            
            <div class="table-responsive">
                <table>
                    <thead>
                        <tr>
                            <th style="width: 60px;">#</th>
                            <th>Order id</th>
                            <th>Total</th>
                            <th>Name</th>
                            <th>Phone</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>1</td>
                            <td>1</td>
                            <td style="font-weight: 600;">$100</td>
                            <td>jhon</td>
                            <td>0912346</td>
                            <td>
                                <div class="action-cell">
                                    <div class="action-dropdown-trigger">
                                        <span class="status-badge accept">Accept</span>
                                        <div class="dropdown-arrow">
                                            <iconify-icon icon="lucide:chevron-down"></iconify-icon>
                                        </div>
                                    </div>
                                    
                                    <!-- Rendered Dropdown Menu Options from the Mockup Design -->
                                    <div class="action-dropdown-menu">
                                        <span class="status-badge preparing">preparing</span>
                                        <span class="status-badge ready">ready</span>
                                        <span class="status-badge complete">complete</span>
                                        <span class="status-badge cancel">cancel</span>
                                    </div>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
            
            <div class="pagination-bar">
                <button class="page-arrow"><iconify-icon icon="lucide:chevron-left"></iconify-icon></button>
                <span class="page-num">1</span>
                <button class="page-arrow"><iconify-icon icon="lucide:chevron-right"></iconify-icon></button>
            </div>
        </div>
    </main>

</body>
</html>
