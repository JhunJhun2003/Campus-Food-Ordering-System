<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://code.iconify.design/iconify-icon/2.1.0/iconify-icon.min.js"></script>
    <link rel="stylesheet" href="admin-users.css">
</head>
<body>

    <aside class="sidebar">
        <a href="#" class="logo-area"><iconify-icon icon="lucide:utensils-crosses"></iconify-icon><span>FOODIE</span></a>
        <ul class="nav-menu">
            <li class="nav-item"><a href="#"><iconify-icon icon="lucide:layout-dashboard"></iconify-icon>Dashboard</a></li>
            <li class="nav-item active"><a href="#"><iconify-icon icon="lucide:users"></iconify-icon>Users</a></li>
            <li class="nav-item"><a href="#"><iconify-icon icon="lucide:book-open"></iconify-icon>Menu</a></li>

            <li class="nav-item"><a href="#"><iconify-icon icon="lucide:bar-chart-3"></iconify-icon>Reports</a></li>
            <li class="nav-item"><a href="#"><iconify-icon icon="lucide:settings"></iconify-icon>Settings</a></li>
            <li class="nav-item" style="margin-top:auto;"><a href="#"><iconify-icon icon="lucide:log-out"></iconify-icon>Logout</a></li>
        </ul>
    </aside>

    <main class="main-workspace">
        <h1 class="page-header">Admin - Manage Users</h1>
        <div class="data-panel">
            <div class="panel-top">
                <div class="search-box">
                    <iconify-icon icon="lucide:search"></iconify-icon>
                    <input type="text" placeholder="Search user directory...">
                </div>
                <button class="filter-btn"><iconify-icon icon="lucide:sliders-horizontal"></iconify-icon></button>
            </div>
            <div class="table-responsive">
                <table>
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Role</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>Jhon Doe</td>
                            <td>JhonDoe@gmail.com</td>
                            <td>Student</td>
                            <td><span class="status-badge">Active</span></td>
                        </tr>
                    </tbody>
                </table>
            </div>
            <div class="pagination-bar">
                <button class="page-arrow"><iconify-icon icon="lucide:chevron-left"></iconify-icon></button>
                <span class="page-num">1</span>
                <button class="page-arrow"><iconify-icon icon="lucide:chevron-right"></iconify-icon></button>
            </div>
        </div>
    </main>

</html>
