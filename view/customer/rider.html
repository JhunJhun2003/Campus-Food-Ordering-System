<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rider Dispatch</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://code.iconify.design/iconify-icon/2.1.0/iconify-icon.min.js"></script>

</head>
<body>
    <div class="status-card">
        <div class="icon-wrap"><iconify-icon icon="lucide:bike"></iconify-icon></div>
        <h2 class="title">Rider is Out!</h2>
        <p class="desc">Our assigned fulfillment driver is speeding over to your location.</p>
        <div class="details-box">
            <div class="row"><span>Assigned Courier Agent</span><strong>Alexander J.</strong></div>
            <div class="row"><span>Vehicle License Plate</span><strong>RIDE-552A</strong></div>
            <div class="row"><span>Estimated Delivery Point</span><strong>10 - 15 Mins</strong></div>
        </div>
        <button class="btn">Call Rider Agent</button>
    </div>
</body>
</html>
