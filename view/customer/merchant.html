<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Merchant Portal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://code.iconify.design/iconify-icon/2.1.0/iconify-icon.min.js"></script>
<link rel="stylesheet" href="merchant.css">
</head>
<body>
    <div class="status-card">
        <div class="icon-wrap"><iconify-icon icon="lucide:store"></iconify-icon></div>
        <h2 class="title">Preparing Your Order</h2>
        <p class="desc">The culinary merchant partners are handling and boxing up your meal fresh right now.</p>
        <div class="details-box">
            <div class="row"><span>2x Cheese Burger Deluxe</span><strong>$ 200</strong></div>
            <div class="row"><span>1x Large Crispy Fries</span><strong>$ 50</strong></div>
            <div class="row total"><span>Total Summary</span><span>$ 250</span></div>
        </div>
        <button class="btn">Accept Delivery Call</button>
    </div>
</body>
</html>
