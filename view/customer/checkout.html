<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Foodie - Checkout</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://code.iconify.design/iconify-icon/2.1.0/iconify-icon.min.js"></script>
<link rel="stylesheet" href="checkout.css">
</head>
<body>
    <div class="checkout-container">
        <div class="steps-header">
            <div class="step active"><div class="step-circle">1</div>Payment</div>
            <div class="step"><div class="step-circle">2</div>Review</div>
            <div class="step"><div class="step-circle">3</div>Complete</div>
        </div>
        <div class="payment-box">
            <h3 class="payment-title">Select Payment Method</h3>
            <label class="option-card">
                <input type="radio" name="payment" checked>
                <span>💵 Cash on Delivery</span>
            </label>
            <label class="option-card">
                <input type="radio" name="payment">
                <span>💳 Credit or Debit Card</span>
            </label>
            <label class="option-card">
                <input type="radio" name="payment">
                <span>📱 Digital Wallet Transfer</span>
            </label>
            <button class="btn-submit">Confirm Order</button>
        </div>
    </div>
</body>
</html>
