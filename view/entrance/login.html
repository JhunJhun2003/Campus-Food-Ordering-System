<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Foodie - Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://code.iconify.design/iconify-icon/2.1.0/iconify-icon.min.js"></script>
    <link rel="stylesheet" href="login.css">
    <style>
        /* Keep your existing login.css - no changes needed */
        .register-fields {
            display: none;
        }
        .register-fields.active {
            display: block;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-banner">
            <iconify-icon icon="fluent-emoji:soup-pot" style="font-size: 96px;"></iconify-icon>
            <h1>FOODIE</h1>
            <p>Delicious food, delivered fast straight to your doorstep.</p>
        </div>
        <div class="auth-form-panel">
            <div class="tab-group">
                <button class="tab-btn active" onclick="switchTab('login')">Login</button>
                <button class="tab-btn" onclick="switchTab('register')">Register</button>
            </div>
            
            <!-- Login Form -->
            <form id="login-form" method="POST" action="">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" name="email" placeholder="name@example.com" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" name="password" placeholder="••••••••" required>
                </div>
                <div class="form-options">
                    <label style="display:flex; gap:6px; cursor:pointer;">
                        <input type="checkbox" name="remember"> Remember me
                    </label>
                    <a href="#">Forgot Password?</a>
                </div>
                <button type="submit" name="login" class="btn-primary">Sign In</button>
            </form>
            
            <!-- Register Form -->
            <form id="register-form" method="POST" action="" style="display:none;">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" name="name" placeholder="John Doe" required>
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" name="email" placeholder="name@example.com" required>
                </div>
                <div class="form-group">
                    <label>Phone Number</label>
                    <input type="tel" name="phone" placeholder="09123456789" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" name="password" placeholder="••••••••" required>
                </div>
                <div class="form-group">
                    <label>Confirm Password</label>
                    <input type="password" name="confirm_password" placeholder="••••••••" required>
                </div>
                <div class="form-options">
                    <label style="display:flex; gap:6px; cursor:pointer;">
                        <input type="checkbox" name="terms" required> I agree to the Terms & Conditions
                    </label>
                </div>
                <button type="submit" name="register" class="btn-primary">Create Account</button>
            </form>
            
            <div class="divider">Or continue with</div>
            <div class="social-group">
                <button class="social-btn"><iconify-icon icon="logos:google-icon"></iconify-icon> Google</button>
                <button class="social-btn"><iconify-icon icon="logos:apple"></iconify-icon> Apple</button>
            </div>
        </div>
    </div>

    <script>
        function switchTab(tab) {
            const loginForm = document.getElementById('login-form');
            const registerForm = document.getElementById('register-form');
            const tabs = document.querySelectorAll('.tab-btn');
            
            if (tab === 'login') {
                loginForm.style.display = 'block';
                registerForm.style.display = 'none';
                tabs[0].classList.add('active');
                tabs[1].classList.remove('active');
            } else {
                loginForm.style.display = 'none';
                registerForm.style.display = 'block';
                tabs[1].classList.add('active');
                tabs[0].classList.remove('active');
            }
        }
    </script>
</body>
</html>
